version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: catalog_postgres
    environment:
      POSTGRES_DB: catalog_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    container_name: catalog_service
    ports:
      - "8081:8081"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/catalog_db
      DB_USER: postgres
      DB_PASS: postgres
    depends_on:
      - postgres

volumes:
  pgdata: