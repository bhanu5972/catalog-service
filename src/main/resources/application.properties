# Application
spring.application.name=catalog-service
server.port=8081

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/catalog_db
spring.datasource.username=eci_user
spring.datasource.password=eci_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

# Actuator - Monitoring endpoints
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# OpenAPI Documentation
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Logging - Structured JSON format
logging.pattern.console={"timestamp":"%d{ISO8601}","level":"%p","service":"catalog-service","traceId":"%X{traceId}","message":"%m"}%n
logging.level.com.example.catalog=DEBUG

# Optional: Connection pool settings (recommended)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# Optional: Performance tuning
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true